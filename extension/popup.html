<!DOCTYPE html>
<html lang="en">
<head>
   <link rel="stylesheet" href="popup.css">
   
</head>
<body>
    <div class="container">

        <div class="logo">
            <img id="logo-img" src="logo.png" alt="Logo">
            <p class="name">ProDoubt</p>
        </div>

        <div class="intro">
            <h2 class="intro-text">
                Hi! Ask your doubt about the Product.
            </h2>

            <textarea
                id="user-input"
                placeholder="Type your question here...">
            </textarea>

            <button id="submit-button">
                Ask AI
            </button>
        </div>

        <div class="response-container">
            <p id="response-text">
                Your response will appear here...
            </p>
        </div>

    </div>

    <script src="popup.js"></script>
</body>
</html>
